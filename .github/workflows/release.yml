name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            pkg_target: node18-win-x64
            artifact_name: avm-config-win-x64.exe
          - os: ubuntu-latest
            pkg_target: node18-linux-x64
            artifact_name: avm-config-linux-x64
          - os: macos-latest
            pkg_target: node18-macos-x64
            artifact_name: avm-config-macos-x64
          - os: macos-latest
            pkg_target: node18-macos-arm64
            artifact_name: avm-config-macos-arm64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build core and CLI
        run: npm run build:core && npm run build:cli

      - name: Rebuild native dependencies for runner
        run: npm rebuild better-sqlite3 -w @avm/core

      - name: Package CLI with pkg
        shell: bash
        run: |
          mkdir -p release/cli
          npx pkg apps/cli/package.json --targets ${{ matrix.pkg_target }} --output release/cli/${{ matrix.artifact_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.artifact_name }}
          path: release/cli/${{ matrix.artifact_name }}

  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: ubuntu-latest
          - os: macos-latest
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 build-essential python3

      - name: Install dependencies
        run: npm ci

      - name: Build and package desktop
        working-directory: apps/desktop
        run: npm run build && npm run electron:compile && npx electron-builder --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: release/desktop/*

  publish:
    needs: [build-cli, build-desktop]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
