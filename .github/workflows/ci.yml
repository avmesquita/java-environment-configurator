name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build core
        run: npm run build:core

      - name: Build CLI
        run: npm run build:cli

      - name: Build desktop (Angular)
        run: npm run build -w @avm/desktop

      - name: Compile Electron
        run: npm run electron:compile -w @avm/desktop
