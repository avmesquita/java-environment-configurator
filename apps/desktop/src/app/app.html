<div class="layout">
  <aside class="sidebar">
    <div class="brand">
      <h1>Java Environment Configurator</h1>
      <p>Tomcat ROOT.xml</p>
    </div>
    <nav>
      @for (item of navItems; track item.path) {
        <a [routerLink]="item.path" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: item.path === '/' }">
          {{ item.label }}
        </a>
      }
    </nav>
  </aside>

  <main class="content">
    <router-outlet />
  </main>
</div>
